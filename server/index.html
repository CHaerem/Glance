<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Glance - ESP32 Management</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<header>
			<h1>Glance</h1>
			<p class="subtitle">Manage and Monitor Your ESP32 Display</p>
		</header>
		<main>
			<!-- Current Flag Section -->
			<section>
				<h2>Currently Displayed Flag</h2>
				<p id="current-flag">Loading...</p>
				<img id="current-flag-img" src="" alt="Current Flag" class="flag-img" />
				<button id="update-current-flag" class="button">
					Update Current Flag
				</button>
				<p id="update-current-status" class="status"></p>
			</section>

			<!-- Next Flag Section -->
			<section>
				<h2>Next Flag to Display</h2>
				<p id="next-flag">Loading...</p>
				<img id="next-flag-img" src="" alt="Next Flag" class="flag-img" />
			</section>

			<!-- Set Next Flag Section -->
			<section>
				<h2>Set Next Flag</h2>
				<input
					type="text"
					id="next-flag-input"
					list="country-suggestions"
					placeholder="Enter Flag ID (e.g., Norway)"
					class="input-field"
					autocomplete="off"
				/>
				<datalist id="country-suggestions">
					<!-- Options will be dynamically populated -->
				</datalist>
				<button id="set-next-flag" class="button">Set Next Flag</button>
				<p id="next-flag-status" class="status"></p>
			</section>
		</main>
		<script src="script.js"></script>
	</body>
</html>
