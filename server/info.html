<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Glance - Flag Info</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<header>
			<h1>Glance Info</h1>
			<p class="subtitle">Detailed Info on the Current Flag</p>
		</header>
		<main>
			<section>
				<h2>Current Flag Details</h2>
				<!-- Where we show the detailed info for the current flag -->
				<img
					id="flag-img"
					src=""
					alt="Flag"
					class="flag-img"
					style="display: none"
				/>

				<!-- Example fields for extended info (same IDs used by updateFlagDetails) -->
				<p>
					<strong>Official Name:</strong> <span id="official-name">N/A</span>
				</p>
				<p><strong>Population:</strong> <span id="population">N/A</span></p>
				<p><strong>Area:</strong> <span id="area">N/A</span></p>
				<p><strong>Capital:</strong> <span id="capital">N/A</span></p>
				<p><strong>Region:</strong> <span id="region">N/A</span></p>
				<p><strong>Subregion:</strong> <span id="subregion">N/A</span></p>
				<p><strong>Languages:</strong> <span id="languages">N/A</span></p>
				<p><strong>Currencies:</strong> <span id="currencies">N/A</span></p>
				<p><strong>Timezones:</strong> <span id="timezones">N/A</span></p>
				<p><strong>Borders:</strong> <span id="borders">N/A</span></p>
			</section>
		</main>
		<script src="info.js"></script>
	</body>
</html>
